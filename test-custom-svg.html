<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Custom SVG Segment Displays</title>
  <style>
    body { background: #111; color: #eee; font-family: sans-serif; padding: 2rem; }
    .size-large { height: 100px; }
  </style>
  <script type="module" src="segment-displays.js"></script>
</head>
<body>
  <h1>Custom SVG Segment Displays</h1>
  
  <div class="panel">
    <h2>7-Segment Display with Custom SVG</h2>
    <seven-segment class="size-large" digits="4" value="8.0:4.5" color="#f0f" bg-color="#202">
      <!-- A custom SVG with round segments instead of lines -->
      <svg viewBox="0 0 70 100">
        <rect x="15" y="5" width="40" height="10" rx="5" class="segment" data-segment="a" />
        <rect x="55" y="15" width="10" height="35" rx="5" class="segment" data-segment="b" />
        <rect x="55" y="50" width="10" height="35" rx="5" class="segment" data-segment="c" />
        <rect x="15" y="85" width="40" height="10" rx="5" class="segment" data-segment="d" />
        <rect x="5" y="50" width="10" height="35" rx="5" class="segment" data-segment="e" />
        <rect x="5" y="15" width="10" height="35" rx="5" class="segment" data-segment="f" />
        <rect x="15" y="45" width="40" height="10" rx="5" class="segment" data-segment="g" />
        <circle cx="60" cy="90" r="5" class="segment" data-segment="dp" />
      </svg>
    </seven-segment>
  </div>
</body>
</html>
