<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Segment Displays</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      padding: 2rem;
    }
    h1 {
      font-weight: 300;
      color: #aaa;
    }
    .panel {
      margin-bottom: 2rem;
      background: #222;
      padding: 1rem;
      border-radius: 8px;
    }
    .panel h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }
    .controls {
      margin-bottom: 1rem;
    }
    input {
      background: #000;
      color: #0f0;
      border: 1px solid #444;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 1.2rem;
    }
    .size-small {
      --segment-stroke-width: 6;
      height: 30px;
    }
    .size-medium {
      --segment-stroke-width: 8;
      height: 50px;
    }
    .size-large {
      --segment-stroke-width: 8;
      height: 80px;
    }
    .size-xlarge {
      --segment-stroke-width: 10;
      height: 180px;
    }
    .size-reference {
      --segment-stroke-width: 8;
      height: 300px;
    }
    /* Wrap the displays so they sit nicely */
    .display-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }
  </style>
  <script type="module" src="segment-displays.js"></script>
</head>
<body>

  <h1>Web Components Segment Displays</h1>

  <div class="panel">
    <h2>7-Segment Display</h2>
    <div class="controls">
      <input type="text" id="input7" value=" 0123456789" maxlength="12" placeholder="Enter number">
    </div>
    <div class="display-group">
      <seven-segment class="synced7 size-small" digits="12" value=" 0123456789" color="#0f0" bg-color="#131"></seven-segment>
      <seven-segment class="synced7 size-medium" digits="12" value=" 0123456789" color="#0f0" bg-color="#131"></seven-segment>
      <seven-segment class="synced7 size-large" digits="12" value=" 0123456789" color="#0f0" bg-color="#131"></seven-segment>
    </div>
    <br>
    <button id="btn7-anim">Animate Segments</button>
  </div>

  <div class="panel">
    <h2>16-Segment Display</h2>
    <div class="controls">
      <input type="text" id="input16" value="ABCDEFGHIJK  " maxlength="13" placeholder="Enter text">
    </div>
    <div class="display-group">
      <sixteen-segment class="synced16 size-small" digits="13" value="ABCDEFGHIJK  " color="#0ff" bg-color="#022"></sixteen-segment>
      <sixteen-segment class="synced16 size-medium" digits="13" value="ABCDEFGHIJK  " color="#0ff" bg-color="#022"></sixteen-segment>
      <sixteen-segment class="synced16 size-large" digits="13" value="ABCDEFGHIJK  " color="#0ff" bg-color="#022"></sixteen-segment>
    </div>
    <br>
    <button id="btn16-anim">Test setSegments()</button>
  </div>

  <div class="panel">
    <h2>Reference (Segment Layout)</h2>
    <div class="display-group" style="flex-direction: row; gap: 4rem;">
      <div style="text-align: center;">
        <h3 style="margin-top: 0; color: #aaa;">7-Segment</h3>
        <seven-segment id="ref7" class="size-reference show-labels" digits="1" color="#888" bg-color="#222"></seven-segment>
      </div>
      <div style="text-align: center;">
        <h3 style="margin-top: 0; color: #aaa;">16-Segment</h3>
        <sixteen-segment id="ref16" class="size-reference show-labels" digits="1" color="#888" bg-color="#222"></sixteen-segment>
      </div>
    </div>
  </div>

  <script type="module">
    await Promise.all([
      customElements.whenDefined('seven-segment'),
      customElements.whenDefined('sixteen-segment'),
    ]);

    const input7 = document.getElementById('input7');
    const seg7s = document.querySelectorAll('.synced7');
    input7.addEventListener('input', (e) => {
      seg7s.forEach(seg => seg.setValue(e.target.value));
    });

    const input16 = document.getElementById('input16');
    const seg16s = document.querySelectorAll('.synced16');
    input16.addEventListener('input', (e) => {
      seg16s.forEach(seg => seg.setValue(e.target.value));
    });

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // Animation Demo 7-Seg
    document.getElementById('btn7-anim').addEventListener('click', async () => {
      const sequence = [
        { a: true, b: false, c: false, d: false, e: false, f: false, g: false },
        { a: false, b: true, c: false, d: false, e: false, f: false, g: false },
        { a: false, b: false, c: true, d: false, e: false, f: false, g: false },
        { a: false, b: false, c: false, d: true, e: false, f: false, g: false },
        { a: false, b: false, c: false, d: false, e: true, f: false, g: false },
        { a: false, b: false, c: false, d: false, e: false, f: true, g: false },
      ];
      
      for await (const step of Array(21).keys()) {
        for (let i = 0; i < 4; i++) {
          seg7s.forEach(seg => seg.setSegments(i, sequence[step % sequence.length]));
        }
        await sleep(100);
      }
      seg7s.forEach(seg => seg.setValue(input7.value)); // Restore
    });

    // Animation Demo 16-Seg
    document.getElementById('btn16-anim').addEventListener('click', async () => {
      const allPossibleSegments = ['a1','a2','b','c','d1','d2','e','f','g1','g2','h','i','j','k','l','m','dp'];
      const path = ["f", "e", "k", "j", "b", "c", "m", "h", "f", "g1", "g2", "c", "d2", "d1", "e", "g1", "g2", "b", "a2", "a1", "i", "l", "d1", "e"];
      
      const sequence = path.map(name => {
        const map = {};
        allPossibleSegments.forEach(s => map[s] = (s === name));
        return map;
      });

      for await (const step of Array(sequence.length * 2).keys()) {
        const map = sequence[step % sequence.length];
        for(let i=0; i<8; i++) {
          seg16s.forEach(seg => seg.setSegments(i, map));
        }
        await sleep(80);
      }
      seg16s.forEach(seg => seg.setValue(input16.value)); // Restore
    });

    // Reference displays - turn ON all segments and show IDs
    const ref7 = document.getElementById('ref7');
    const ref16 = document.getElementById('ref16');
    ref7.setSegments(0, {
      a: true, b: true, c: true, d: true, e: true, f: true, g: true, dp: true
    });
    ref7.showSegmentId();
    ref16.setSegments(0, {
      a1: true, a2: true, b: true, c: true, d1: true, d2: true, e: true, f: true,
      g1: true, g2: true, h: true, i: true, j: true, k: true, m: true, l: true, dp: true
    });
    ref16.showSegmentId();
  </script>
</body>
</html>
