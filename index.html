<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Segment Displays</title>
  <style>
    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      padding: 2rem;
    }
    h1 {
      font-weight: 300;
      color: #aaa;
    }
    .panel {
      margin-bottom: 2rem;
      background: #222;
      padding: 1rem;
      border-radius: 8px;
    }
    .panel h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }
    .controls {
      margin-bottom: 1rem;
    }
    input {
      background: #000;
      color: #0f0;
      border: 1px solid #444;
      padding: 0.5rem;
      font-family: monospace;
      font-size: 1.2rem;
    }
  </style>
  <script type="module" src="segment-displays.js"></script>
</head>
<body>

  <h1>Web Components Segment Displays</h1>

  <div class="panel">
    <h2>7-Segment Display</h2>
    <div class="controls">
      <input type="text" id="input7" value="  12" maxlength="4" placeholder="Enter number">
    </div>
    <seven-segment id="seg7" digits="4" value="  12" color="#0f0" bg-color="#131"></seven-segment>
    <br><br>
    <button id="btn7-anim">Animate Segments</button>
  </div>

  <div class="panel">
    <h2>16-Segment Display</h2>
    <div class="controls">
      <input type="text" id="input16" value="HELLO  " maxlength="8" placeholder="Enter text">
    </div>
    <sixteen-segment id="seg16" digits="8" value="HELLO  " color="#0ff" bg-color="#022"></sixteen-segment>
    <br><br>
    <button id="btn16-anim">Test setSegments()</button>
  </div>

  <script>
    const input7 = document.getElementById('input7');
    const seg7 = document.getElementById('seg7');
    input7.addEventListener('input', (e) => {
      seg7.setValue(e.target.value);
    });

    const input16 = document.getElementById('input16');
    const seg16 = document.getElementById('seg16');
    input16.addEventListener('input', (e) => {
      seg16.setValue(e.target.value);
    });

    // Animation Demo 7-Seg
    document.getElementById('btn7-anim').addEventListener('click', () => {
      let step = 0;
      const sequence = [
        { a: true, b: false, c: false, d: false, e: false, f: false, g: false },
        { a: false, b: true, c: false, d: false, e: false, f: false, g: false },
        { a: false, b: false, c: true, d: false, e: false, f: false, g: false },
        { a: false, b: false, c: false, d: true, e: false, f: false, g: false },
        { a: false, b: false, c: false, d: false, e: true, f: false, g: false },
        { a: false, b: false, c: false, d: false, e: false, f: true, g: false },
      ];
      
      const interval = setInterval(() => {
        for (let i = 0; i < 4; i++) {
          seg7.setSegments(i, sequence[step % sequence.length]);
        }
        step++;
        if (step > 20) {
          clearInterval(interval);
          seg7.setValue(input7.value); // Restore
        }
      }, 100);
    });

    // Animation Demo 16-Seg
    document.getElementById('btn16-anim').addEventListener('click', () => {
      const allSegments = ['a1','a2','b','c','d2','d1','e','f','g1','g2','h','i','j','k','m','l'];
      
      let count = 0;
      const interval = setInterval(() => {
        const map = {};
        // Randomly turn on half segments
        allSegments.forEach(seg => {
          map[seg] = Math.random() > 0.5;
        });
        
        for(let i=0; i<8; i++) {
          seg16.setSegments(i, map);
        }

        count++;
        if (count > 10) {
          clearInterval(interval);
          seg16.setValue(input16.value); // Restore
        }
      }, 150);
    });
  </script>
</body>
</html>
